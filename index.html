                    { id: "d_minacu3", type: "EJA", name: "CEE/CEB N440", expiration: "2026-12-31", documentLink: "", observations: "31/12/2026" }

            {

                    { id: "d_ah1", type: "E.F. Anos Iniciais", name: "Res. CME/CP nº04", expiration: "2025-12-31", documentLink: "", observations: "31/12/2025" },
                    { id: "d_ah2", type: "Médio Itinerário", name: "Parecer CEB - CME-01/2023", expiration: "", documentLink: "", observations: "" },

                documents: [

                ]
            },
            {
                id: "s_maria_caldas", name: "SESI Maria Caldas - Nerópolis", type: "Mantenedora",
                documents: [
                    { id: "d_mc1", type: "E.F. Anos Finais", name: "CEE/CEB N.297", expiration: "2026-12-31", documentLink: "", observations: "31/12/2026" },
                    { id: "d_mc2", type: "EJA", name: "CEE/CEB N.297 EJA Presencial", expiration: "2026-12-31", documentLink: "", observations: "31/12/2026" }
                ]
            },
            {
                id: "s_santa_maria", name: "SESI Santa Maria - Flores de Goiás", type: "Mantenedora",
                documents: [
                    { id: "d_sm1", type: "Ed. Infantil", name: "Resolução CME n.04", expiration: "", documentLink: "", observations: "" }
                ]
            }
        ];

        const Icons = {
            Alert: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Check: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            XCircle: () => <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>,
            Edit: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>,
            Trash: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>,
            Plus: () => <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 4v16m8-8H4"></path></svg>,
            Search: () => <svg className="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>,
            Download: () => <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4-4m0 0l-4-4m4 4V4"></path></svg>,
            ExternalLink: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>,
            Upload: () => <svg className="w-5 h-5 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
        };

        const App = () => {
            const [schools, setSchools] = useState(() => {
                const saved = localStorage.getItem('sesiEscolasDocs');
                if (saved) return JSON.parse(saved);
                return initialData;
            });

            // Filtros
            const [searchTerm, setSearchTerm] = useState('');
            const [filterSchool, setFilterSchool] = useState('');
            const [filterStatus, setFilterStatus] = useState('');
            const [filterType, setFilterType] = useState('');

            const officialTypes = [
                "Autorização EAD",
                "Autorização Presencial",
                "CERCON - CERTIFICADO DE CONFORMIDADE DO CORPO DE BOMBEIROS",
                "ALVARÁ DE VIGILÂNCIA SANITÁRIA",
                "ALVARÁ DE LOCALIZAÇÃO E FUNCIONAMENTO DA PREFEITURA MUNICIPAL"
            ];

            const availableTypes = useMemo(() => {
                const types = new Set(officialTypes);
                schools.forEach(s => s.documents.forEach(d => {
                    if(d.type) types.add(d.type);
                }));
                return Array.from(types);
            }, [schools]);

            // Estados do Modal
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [modalSchoolId, setModalSchoolId] = useState(''); // ID da escola sendo alterada
            const [originalSchoolId, setOriginalSchoolId] = useState(null); // ID original para caso o user mude a escola do doc
            
            // Dados da Nova Escola (caso crie no modal)
            const [newSchoolName, setNewSchoolName] = useState('');
            const [newSchoolType, setNewSchoolType] = useState('Própria');

            const [formData, setFormData] = useState({ id: '', type: '', name: '', expiration: '', observations: '', documentLink: '' });

            useEffect(() => {
                localStorage.setItem('sesiEscolasDocs', JSON.stringify(schools));
            }, [schools]);

            const getDocumentStatus = (expirationStr) => {
                if (!expirationStr) return { label: 'Indefinido', color: 'bg-gray-100 text-gray-800', key: 'unknown', icon: null };
                
                const expDate = new Date(expirationStr + 'T00:00:00'); 
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                
                const diffTime = expDate - today;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                if (diffDays < 0) return { label: 'Vencido', color: 'bg-red-100 text-red-800 border-red-200', key: 'expired', icon: <Icons.XCircle /> };
                if (diffDays <= 90) return { label: 'Atenção (< 90 dias)', color: 'bg-yellow-100 text-yellow-800 border-yellow-200', key: 'warning', icon: <Icons.Alert /> };
                return { label: 'Regular', color: 'bg-green-100 text-green-800 border-green-200', key: 'valid', icon: <Icons.Check /> };
            };

            const processedData = useMemo(() => {
                let totalDocs = 0;
                let expiredDocs = 0;
                let warningDocs = 0;
                let validDocs = 0;

                const filtered = schools.map(school => {
                    if (filterSchool && school.id !== filterSchool) return null;

                    const filteredDocs = school.documents.filter(doc => {
                        const status = getDocumentStatus(doc.expiration).key;
                        
                        if (filterStatus && status !== filterStatus) return false;
                        if (filterType && doc.type !== filterType) return false;
                        
                        const searchLower = searchTerm.toLowerCase();
                        if (searchTerm && !(
                            school.name.toLowerCase().includes(searchLower) ||
                            doc.type.toLowerCase().includes(searchLower) ||
                            doc.name.toLowerCase().includes(searchLower) ||
                            doc.observations.toLowerCase().includes(searchLower)
                        )) {
                            return false;
                        }

                        totalDocs++;
                        if (status === 'expired') expiredDocs++;
                        if (status === 'warning') warningDocs++;
                        if (status === 'valid') validDocs++;

                        return true;
                    });

                    if (filteredDocs.length === 0 && (filterStatus || filterType || searchTerm)) return null;

                    return { ...school, documents: filteredDocs };
                }).filter(Boolean);

                return { filtered, stats: { totalDocs, expiredDocs, warningDocs, validDocs } };
            }, [schools, searchTerm, filterSchool, filterStatus, filterType]);

            const openAddModal = (schoolId = '') => {
                setModalSchoolId(schoolId);
                setOriginalSchoolId(null);
                setNewSchoolName('');
                setNewSchoolType('Própria');
                setFormData({ id: '', type: '', name: '', expiration: '', observations: '', documentLink: '' });
                setIsModalOpen(true);
            };

            const openEditModal = (schoolId, doc) => {
                setModalSchoolId(schoolId);
                setOriginalSchoolId(schoolId);
                setNewSchoolName('');
                setNewSchoolType('Própria');
                setFormData({ ...doc });
                setIsModalOpen(true);
            };

            const handleDelete = (schoolId, docId) => {
                if(confirm("Tem certeza que deseja excluir esta documentação?")) {
                    setSchools(prev => prev.map(sch => {
                        if (sch.id === schoolId) {
                            return { ...sch, documents: sch.documents.filter(d => d.id !== docId) };
                        }
                        return sch;
                    }));
                }
            };

            const handleSaveDocument = (e) => {
                e.preventDefault();
                
                if (!modalSchoolId) {
                    alert("Por favor, selecione uma unidade escolar.");
                    return;
                }

                let finalSchoolId = modalSchoolId;
                let updatedSchools = [...schools];

                // 1. Criar nova escola se selecionado
                if (modalSchoolId === 'new_school') {
                    finalSchoolId = 's_' + Date.now();
                    const newSchool = {
                        id: finalSchoolId,
                        name: newSchoolName,
                        type: newSchoolType,
                        documents: []
                    };
                    updatedSchools.push(newSchool);
                }

                const docToSave = formData.id ? formData : { ...formData, id: 'd_' + Date.now() };

                // 2. Remover doc da escola antiga (se mudou de escola)
                if (formData.id && originalSchoolId && originalSchoolId !== finalSchoolId) {
                    updatedSchools = updatedSchools.map(sch => {
                        if (sch.id === originalSchoolId) {
                            return { ...sch, documents: sch.documents.filter(d => d.id !== formData.id) };
                        }
                        return sch;
                    });
                }

                // 3. Adicionar/Atualizar na escola final
                updatedSchools = updatedSchools.map(sch => {
                    if (sch.id === finalSchoolId) {
                        const docExists = sch.documents.some(d => d.id === docToSave.id);
                        if (docExists) {
                            return { ...sch, documents: sch.documents.map(d => d.id === docToSave.id ? docToSave : d) };
                        } else {
                            return { ...sch, documents: [...sch.documents, docToSave] };
                        }
                    }
                    return sch;
                });

                setSchools(updatedSchools);
                setIsModalOpen(false);
            };

            const resetData = () => {
                if(confirm("Deseja restaurar os dados originais do sistema? Todas as alterações manuais serão perdidas.")) {
                    setSchools(initialData);
                }
            };

            const exportToCSV = () => {
                const headers = ['Unidade', 'Tipo de Escola', 'Nível de Ensino / Curso', 'Processo / Resolução', 'Link de Acesso', 'Validade', 'Status', 'Observacoes'];
                const rows = [];
                
                processedData.filtered.forEach(school => {
                    school.documents.forEach(doc => {
                        const statusObj = getDocumentStatus(doc.expiration);
                        const dataFormatada = doc.expiration ? new Date(doc.expiration + 'T00:00:00').toLocaleDateString('pt-BR') : '-';
                        const cleanStr = (str) => `"${(str || '').replace(/"/g, '""')}"`;

                        rows.push([
                            cleanStr(school.name),
                            cleanStr(school.type),
                            cleanStr(doc.type),
                            cleanStr(doc.name),
                            cleanStr(doc.documentLink),
                            cleanStr(dataFormatada),
                            cleanStr(statusObj.label),
                            cleanStr(doc.observations)
                        ].join(';'));
                    });
                });

                const csvContent = headers.join(';') + '\n' + rows.join('\n');
                const blob = new Blob(["\uFEFF" + csvContent], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `relatorio_documentacoes_sesi_${new Date().toISOString().split('T')[0]}.csv`;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                URL.revokeObjectURL(url);
            };

            const handleImportCSV = (event) => {
                const file = event.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (e) => {
                    const text = e.target.result;
                    const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                    if (lines.length < 2) {
                        alert('O arquivo parece estar vazio ou sem dados válidos.');
                        return;
                    }

                    // Identifica se o separador do Excel é vírgula ou ponto e vírgula
                    const sep = lines[0].includes(';') ? ';' : ',';
                    const headers = lines[0].split(sep).map(h => h.trim().replace(/(^"|"$)/g, '').toLowerCase());

                    // Mapeia as colunas dinamicamente buscando nomes similares
                    const idxUnidade = headers.findIndex(h => h.includes('unidade') || h.includes('escola'));
                    const idxTipoEscola = headers.findIndex(h => h.includes('tipo de escola') || h.includes('tipo da unidade'));
                    const idxTipoDoc = headers.findIndex(h => h.includes('nível') || h.includes('curso') || h.includes('tipo de documento'));
                    const idxNome = headers.findIndex(h => h.includes('processo') || h.includes('resolução') || h.includes('documento'));
                    const idxLink = headers.findIndex(h => h.includes('link'));
                    const idxValidade = headers.findIndex(h => h.includes('validade') || h.includes('vencimento'));
                    const idxObs = headers.findIndex(h => h.includes('observa') || h.includes('obs'));

                    if (idxUnidade === -1 || idxNome === -1) {
                        alert('Colunas obrigatórias não encontradas. O CSV deve conter pelo menos "Unidade" e "Processo / Resolução".');
                        return;
                    }

                    const newSchoolsMap = new Map();

                    for (let i = 1; i < lines.length; i++) {
                        const regex = new RegExp(`(?:^|${sep})("(?:[^"]|"")*"|[^${sep}]*)`, 'g');
                        let row = [];
                        let match;
                        while ((match = regex.exec(lines[i])) !== null) {
                            if (match[1] !== undefined) {
                                row.push(match[1].replace(/(^"|"$)/g, '').replace(/""/g, '"').trim());
                            }
                            if (regex.lastIndex === 0) break; 
                        }

                        if (row.length < 2) continue;

                        const schoolName = row[idxUnidade] || 'Unidade Desconhecida';
                        const schoolType = idxTipoEscola !== -1 ? (row[idxTipoEscola] || 'Própria') : 'Própria';
                        const docType = idxTipoDoc !== -1 ? (row[idxTipoDoc] || 'Documento') : 'Documento';
                        const docName = row[idxNome] || 'Sem Título';
                        let docExpiration = idxValidade !== -1 ? row[idxValidade] : '';
                        const docLink = idxLink !== -1 ? row[idxLink] : '';
                        const docObs = idxObs !== -1 ? row[idxObs] : '';

                        // Converte data DD/MM/YYYY para o padrão do sistema (YYYY-MM-DD)
                        if (docExpiration && docExpiration.includes('/')) {
                            const parts = docExpiration.split('/');
                            if (parts.length === 3) {
                                docExpiration = `${parts[2]}-${parts[1]}-${parts[0]}`;
                            }
                        }

                        if (!newSchoolsMap.has(schoolName)) {
                            newSchoolsMap.set(schoolName, {
                                id: 's_imp_' + Date.now() + Math.random().toString(36).substr(2, 9),
                                name: schoolName,
                                type: schoolType,
                                documents: []
                            });
                        }

                        if(docName !== 'Sem Título' && docName !== '') {
                            newSchoolsMap.get(schoolName).documents.push({
                                id: 'd_imp_' + Date.now() + Math.random().toString(36).substr(2, 9),
                                type: docType,
                                name: docName,
                                expiration: docExpiration,
                                documentLink: docLink,
                                observations: docObs
                            });
                        }
                    }

                    const importedSchools = Array.from(newSchoolsMap.values());
                    if (importedSchools.length > 0) {
                        if (confirm(`Encontradas ${importedSchools.length} unidades no arquivo. Deseja substituir os dados atuais do painel por estes novos dados importados?`)) {
                            setSchools(importedSchools);
                        }
                    } else {
                        alert('Nenhum dado válido encontrado para importar.');
                    }
                };
                reader.readAsText(file, 'ISO-8859-1'); // Previne falha com acentos típicos de planilhas BR
                event.target.value = null; // Reseta o input
            };

            return (
                <div className="min-h-screen pb-12">
                    <header className="bg-sesi-blue text-white py-6 shadow-md">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-bold tracking-tight">SESI <span className="font-light">Documentações</span></h1>
                                <p className="text-sesi-light mt-1 text-sm">Controle de Autorizações de Funcionamento Escolar</p>
                            </div>
                            <div className="flex items-center gap-4">
                                <button onClick={resetData} className="text-xs bg-white/20 hover:bg-white/30 px-3 py-1.5 rounded transition">
                                    Restaurar Planilha Base
                                </button>
                                <div className="bg-white p-2 rounded-lg shadow-sm">
                                    <img 
                                        src="https://i.postimg.cc/5y6TzvGM/marca-SESI-2024-completa-colorida.png" 
                                        alt="Logo SESI" 
                                        className="h-10 object-contain"
                                    />
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 mt-8">
                        
                        {/* Infográfico Superior */}
                        <div className="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                            <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex items-center justify-between border-l-4 border-l-sesi-blue">
                                <div>
                                    <p className="text-sm text-gray-500 font-bold uppercase tracking-wide">Total Documentos</p>
                                    <h3 className="text-3xl font-light text-gray-800 mt-1">{processedData.stats.totalDocs}</h3>
                                </div>
                            </div>
                            <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex items-center justify-between border-l-4 border-l-red-500">
                                <div>
                                    <p className="text-sm text-red-600 font-bold uppercase tracking-wide">Vencidos</p>
                                    <h3 className="text-3xl font-light text-gray-800 mt-1">{processedData.stats.expiredDocs}</h3>
                                </div>
                                <div className="text-red-500 opacity-50"><Icons.XCircle /></div>
                            </div>
                            <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex items-center justify-between border-l-4 border-l-yellow-400">
                                <div>
                                    <p className="text-sm text-yellow-600 font-bold uppercase tracking-wide">Atenção (Próximos)</p>
                                    <h3 className="text-3xl font-light text-gray-800 mt-1">{processedData.stats.warningDocs}</h3>
                                </div>
                                <div className="text-yellow-500 opacity-50"><Icons.Alert /></div>
                            </div>
                            <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm flex items-center justify-between border-l-4 border-l-green-500">
                                <div>
                                    <p className="text-sm text-green-600 font-bold uppercase tracking-wide">Regulares</p>
                                    <h3 className="text-3xl font-light text-gray-800 mt-1">{processedData.stats.validDocs}</h3>
                                </div>
                                <div className="text-green-500 opacity-50"><Icons.Check /></div>
                            </div>
                        </div>

                        {/* Barra de Filtros e Botões Globais */}
                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-8 flex flex-col md:flex-row gap-4 items-center justify-between">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 flex-1 w-full">
                                <div className="relative w-full">
                                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                        <Icons.Search />
                                    </div>
                                    <input 
                                        type="text" 
                                        placeholder="Buscar por resolução ou curso..." 
                                        className="w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue focus:border-transparent text-sm"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                                <div className="w-full">
                                    <select 
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue bg-white text-sm truncate"
                                        value={filterSchool}
                                        onChange={(e) => setFilterSchool(e.target.value)}
                                    >
                                        <option value="">Todas as Escolas</option>
                                        {schools.map(s => (
                                            <option key={s.id} value={s.id}>{s.name}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="w-full">
                                    <select 
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue bg-white text-sm truncate"
                                        value={filterType}
                                        onChange={(e) => setFilterType(e.target.value)}
                                        title={filterType || "Todos os Tipos"}
                                    >
                                        <option value="">Todos os Tipos</option>
                                        {availableTypes.map((type, idx) => (
                                            <option key={`ft_${idx}`} value={type}>{type}</option>
                                        ))}
                                    </select>
                                </div>
                                <div className="w-full">
                                    <select 
                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue bg-white text-sm"
                                        value={filterStatus}
                                        onChange={(e) => setFilterStatus(e.target.value)}
                                    >
                                        <option value="">Todos os Status</option>
                                        <option value="valid">Regulares</option>
                                        <option value="warning">Atenção (Vencendo)</option>
                                        <option value="expired">Vencidos</option>
                                    </select>
                                </div>
                            </div>
                            
                            <div className="w-full lg:w-auto mt-4 md:mt-0 flex flex-col sm:flex-row gap-2">
                                <button 
                                    onClick={() => openAddModal('')}
                                    className="w-full sm:w-auto flex items-center justify-center px-4 py-2 border border-transparent text-white bg-sesi-blue hover:bg-sesi-dark rounded-lg transition font-medium text-sm shadow-sm"
                                >
                                    <Icons.Plus /> Novo Documento
                                </button>
                                
                                {/* Input oculto para carregar arquivo CSV */}
                                <input 
                                    type="file" 
                                    id="csvFileInput" 
                                    accept=".csv" 
                                    className="hidden" 
                                    onChange={handleImportCSV} 
                                />
                                <button 
                                    onClick={() => document.getElementById('csvFileInput').click()}
                                    className="w-full sm:w-auto flex items-center justify-center px-4 py-2 border border-gray-300 text-gray-700 bg-white hover:bg-gray-50 rounded-lg transition font-medium text-sm"
                                    title="Importar dados de um arquivo CSV"
                                >
                                    <Icons.Upload /> Importar CSV
                                </button>

                                <button 
                                    onClick={exportToCSV}
                                    className="w-full sm:w-auto flex items-center justify-center px-4 py-2 border border-green-600 text-green-600 bg-white hover:bg-green-50 rounded-lg transition font-medium text-sm"
                                    title="Exportar dados filtrados para Excel"
                                >
                                    <Icons.Download /> Exportar Relatório
                                </button>
                            </div>
                        </div>

                        {/* Grade de Escolas e Documentos */}
                        <div className="space-y-8">
                            {processedData.filtered.length === 0 ? (
                                <div className="text-center py-12 text-gray-500">
                                    Nenhum documento encontrado para os filtros selecionados.
                                </div>
                            ) : (
                                processedData.filtered.map(school => (
                                    <div key={school.id} className="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
                                        <div className="bg-gray-50 px-6 py-4 border-b border-gray-200 flex justify-between items-center">
                                            <div>
                                                <h2 className="text-xl font-bold text-sesi-dark">{school.name}</h2>
                                                <span className="text-xs text-gray-500 uppercase tracking-wider">{school.type}</span>
                                            </div>
                                            <button 
                                                onClick={() => openAddModal(school.id)}
                                                className="flex items-center text-sm bg-gray-200 hover:bg-gray-300 text-gray-700 px-4 py-2 rounded-lg transition font-medium"
                                            >
                                                <Icons.Plus /> Adicionar aqui
                                            </button>
                                        </div>
                                        
                                        <div className="p-0 overflow-x-auto">
                                            <table className="min-w-full divide-y divide-gray-200">
                                                <thead className="bg-gray-50">
                                                    <tr>
                                                        <th className="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Tipo / Curso</th>
                                                        <th className="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Documento / Resolução</th>
                                                        <th className="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Validade</th>
                                                        <th className="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Status</th>
                                                        <th className="px-6 py-3 text-left text-xs font-bold text-gray-500 uppercase tracking-wider">Observações</th>
                                                        <th className="px-6 py-3 text-right text-xs font-bold text-gray-500 uppercase tracking-wider">Ações</th>
                                                    </tr>
                                                </thead>
                                                <tbody className="bg-white divide-y divide-gray-200">
                                                    {school.documents.map(doc => {
                                                        const status = getDocumentStatus(doc.expiration);
                                                        return (
                                                            <tr key={doc.id} className="hover:bg-gray-50 transition">
                                                                <td className="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">
                                                                    {doc.type}
                                                                </td>
                                                                <td className="px-6 py-4 text-sm text-gray-600 max-w-xs truncate" title={doc.name}>
                                                                    <div className="flex items-center gap-2">
                                                                        <span className="truncate">{doc.name}</span>
                                                                        {doc.documentLink && (
                                                                            <a href={doc.documentLink} target="_blank" rel="noopener noreferrer" className="text-sesi-blue hover:text-sesi-dark flex-shrink-0" title="Acessar Documento">
                                                                                <Icons.ExternalLink />
                                                                            </a>
                                                                        )}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                                                                    {doc.expiration ? new Date(doc.expiration + 'T00:00:00').toLocaleDateString('pt-BR') : '-'}
                                                                </td>
                                                                <td className="px-6 py-4 whitespace-nowrap">
                                                                    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${status.color}`}>
                                                                        <span className="mr-1.5">{status.icon}</span>
                                                                        {status.label}
                                                                    </span>
                                                                </td>
                                                                <td className="px-6 py-4 text-sm text-gray-500 max-w-xs truncate" title={doc.observations}>
                                                                    {doc.observations || '-'}
                                                                </td>
                                                                <td className="px-6 py-4 whitespace-nowrap text-right text-sm font-medium">
                                                                    <button onClick={() => openEditModal(school.id, doc)} className="text-sesi-blue hover:text-sesi-dark mx-2 inline-block" title="Editar">
                                                                        <Icons.Edit />
                                                                    </button>
                                                                    <button onClick={() => handleDelete(school.id, doc.id)} className="text-red-500 hover:text-red-700 mx-2 inline-block" title="Excluir">
                                                                        <Icons.Trash />
                                                                    </button>
                                                                </td>
                                                            </tr>
                                                        );
                                                    })}
                                                    {school.documents.length === 0 && (
                                                        <tr>
                                                            <td colSpan="6" className="px-6 py-8 text-center text-sm text-gray-500">
                                                                Nenhuma documentação cadastrada para esta unidade.
                                                            </td>
                                                        </tr>
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>

                    </main>

                    {}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col max-h-[90vh]">
                                <div className="px-6 py-4 border-b border-gray-200 flex justify-between items-center bg-gray-50">
                                    <h3 className="text-lg font-bold text-gray-800">
                                        {formData.id ? 'Editar Documento' : 'Nova Documentação'}
                                    </h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                                        <Icons.XCircle />
                                    </button>
                                </div>
                                <div className="p-6 overflow-y-auto hide-scroll">
                                    <form id="docForm" onSubmit={handleSaveDocument} className="space-y-5">
                                        
                                        {/* Box de Seleção de Escola */}
                                        <div className="bg-gray-50 p-4 rounded-lg border border-gray-200 space-y-4">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-sm font-bold text-gray-700 mb-1">Unidade Escolar *</label>
                                                    <select 
                                                        required
                                                        className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue bg-white"
                                                        value={modalSchoolId}
                                                        onChange={(e) => setModalSchoolId(e.target.value)}
                                                    >
                                                        <option value="" disabled>Selecione uma unidade...</option>
                                                        {schools.map(s => (
                                                            <option key={s.id} value={s.id}>{s.name}</option>
                                                        ))}
                                                        <option value="new_school" className="font-bold text-sesi-blue bg-blue-50">
                                                            + Cadastrar Nova Unidade
                                                        </option>
                                                    </select>
                                                </div>
                                                
                                                {/* Se for escola existente, mostra o tipo desabilitado */}
                                                {modalSchoolId && modalSchoolId !== 'new_school' && (
                                                    <div>
                                                        <label className="block text-sm font-medium text-gray-500 mb-1">Tipo de Unidade</label>
                                                        <input 
                                                            type="text" 
                                                            disabled
                                                            className="w-full px-3 py-2 border border-transparent rounded-lg bg-gray-100 text-gray-500 cursor-not-allowed"
                                                            value={schools.find(s => s.id === modalSchoolId)?.type || ''}
                                                        />
                                                    </div>
                                                )}
                                            </div>

                                            {/* Campos para Cadastrar Nova Escola */}
                                            {modalSchoolId === 'new_school' && (
                                                <div className="pt-4 mt-2 border-t border-gray-200 grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    <div>
                                                        <label className="block text-sm font-bold text-sesi-blue mb-1">Nome da Nova Unidade *</label>
                                                        <input 
                                                            type="text" required
                                                            placeholder="Ex: SESI Novo Centro"
                                                            className="w-full px-3 py-2 border border-sesi-blue/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue bg-white"
                                                            value={newSchoolName} onChange={(e) => setNewSchoolName(e.target.value)}
                                                        />
                                                    </div>
                                                    <div>
                                                        <label className="block text-sm font-bold text-sesi-blue mb-1">Tipo da Unidade *</label>
                                                        <select 
                                                            required
                                                            className="w-full px-3 py-2 border border-sesi-blue/30 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue bg-white"
                                                            value={newSchoolType} onChange={(e) => setNewSchoolType(e.target.value)}
                                                        >
                                                            <option value="Própria">Própria</option>
                                                            <option value="Mantenedora">Mantenedora</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="md:col-span-2">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Tipo de Documento / Nível de Ensino *</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    list="docTypesList"
                                                    placeholder="Selecione ou digite o tipo..."
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue"
                                                    value={formData.type}
                                                    onChange={(e) => setFormData({...formData, type: e.target.value})}
                                                />
                                                <datalist id="docTypesList">
                                                    {availableTypes.map((type, idx) => (
                                                        <option key={`dl_${idx}`} value={type} />
                                                    ))}
                                                </datalist>
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Nome/Número do Processo ou Resolução *</label>
                                                <input 
                                                    type="text" 
                                                    required
                                                    placeholder="Ex: CEE/CEB N.452"
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue"
                                                    value={formData.name}
                                                    onChange={(e) => setFormData({...formData, name: e.target.value})}
                                                />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Link de Acesso (URL do Documento)</label>
                                                <input 
                                                    type="url" 
                                                    placeholder="Ex: https://drive.google.com/..."
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue"
                                                    value={formData.documentLink || ''}
                                                    onChange={(e) => setFormData({...formData, documentLink: e.target.value})}
                                                />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Data de Vencimento *</label>
                                                <input 
                                                    type="date" 
                                                    required
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue"
                                                    value={formData.expiration}
                                                    onChange={(e) => setFormData({...formData, expiration: e.target.value})}
                                                />
                                            </div>
                                            <div className="md:col-span-2">
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Observações / Status atual</label>
                                                <textarea 
                                                    rows="2"
                                                    placeholder="Detalhes adicionais, pendências..."
                                                    className="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-sesi-blue"
                                                    value={formData.observations}
                                                    onChange={(e) => setFormData({...formData, observations: e.target.value})}
                                                ></textarea>
                                            </div>
                                        </div>
                                    </form>
                                </div>
                                <div className="px-6 py-4 border-t border-gray-200 bg-gray-50 flex justify-end gap-3">
                                    <button 
                                        type="button" 
                                        onClick={() => setIsModalOpen(false)}
                                        className="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg hover:bg-gray-50"
                                    >
                                        Cancelar
                                    </button>
                                    <button 
                                        type="submit" 
                                        form="docForm"
                                        className="px-4 py-2 text-sm font-medium text-white bg-sesi-blue border border-transparent rounded-lg hover:bg-sesi-dark shadow-sm"
                                    >
                                        Salvar Documento
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // Renderização
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
